<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2W7N9TRH7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-F2W7N9TRH7');
  </script>
  
  <title>CAM SENG RESTAURANT - Forgot Password</title>
</head>
<body style="background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

  <!-- মূল কন্টেইনার বক্স -->
  <div style="background: #1f2833; width: 100%; max-width: 500px; border-radius: 16px; padding: 40px 35px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #45f3ff33; text-align: center; box-sizing: border-box;">
    
    <!-- টপ ব্যানার বা শিরোনাম বার্তা -->
    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); padding: 15px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <span style="color: #45f3ff; font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Forgot Your Password?</span>
    </div>

    <!-- লোগো বা লক আইকন এরিয়া -->
    <div style="font-size: 55px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #ff4757);">🔒</div>
    <h2 style="margin: 0 0 15px 0; font-size: 28px; color: #45f3ff; letter-spacing: 1px; font-weight: 600;">Reset Password</h2>
    
    <!-- ছোট নির্দেশনামূলক টেক্সট -->
    <p style="color: #c5c6c7; font-size: 15px; margin: 0 0 30px 0; line-height: 1.5; text-align: center;">
      আপনার অ্যাকাউন্ট তৈরিতে ব্যবহৃত নিবন্ধিত ইমেইলটি নিচে দিন। আমরা পাসওয়ার্ড রিসেট করার জন্য একটি অফিশিয়াল লিংক পাঠাবো।
    </p>

    <!-- ফর্ম শুরু -->
    <form id="resetForm" style="display: flex; flex-direction: column; gap: 25px; text-align: left;">
      
      <!-- ইমেইল ইনপুট বক্স -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 10px; font-weight: 500;">Registered Email Address:</label>
        <input type="email" id="resetInput" placeholder="Enter Registered Email" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- সাবমিট বাটন -->
      <button type="button" id="submitBtn"
              style="background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4); margin-top: 5px;">
        Send Reset Link
      </button>

      <!-- আগের লগইন পেজে ফিরে যাওয়ার লিংক -->
      <div style="text-align: center; margin-top: 5px;">
        <a href="login&registration.html" style="color: #45f3ff; font-size: 15px; text-decoration: none; font-weight: 500; border-bottom: 1px dashed #45f3ff; padding-bottom: 2px;">Back to Login</a>
      </div>

    </form>

    <!-- ফুটার কপিরাইট সেকশন -->
    <div style="margin-top: 40px; border-top: 1px solid #2f3e46; padding-top: 20px; font-size: 13px; color: #868e96; line-height: 1.6;">
        <p style="margin: 0;">&copy; Copyright 2026. All Rights Reserved to Well Food.</p>
        <p style="margin: 5px 0 0 0;">Developed by XYZ Communication, Design & Managed</p>
    </div>

  </div>

<!-- গুগলের অফিশিয়াল ফায়ারবেস স্ক্রিপ্ট লাইব্রেরি লিংক (ফিক্সড) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBEs5Tchusl9iSNDgik95jL_qMBQaF5lQk",
    authDomain: "cam-seng-restaurant.firebaseapp.com",
    projectId: "cam-seng-restaurant",
    storageBucket: "cam-seng-restaurant.firebasestorage.app",
    messagingSenderId: "142330585238",
    appId: "1:142330585238:web:2f3fd08ccd9743dd4762b7",
    measurementId: "G-9FXQ682T0D"
  };

  // ফায়ারবেস ইনিশিয়েলাইজ
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById('submitBtn').addEventListener('click', function() {
    const emailVal = document.getElementById('resetInput').value;

    if(emailVal === "") {
      alert("অনুগ্রহ করে আপনার নিবন্ধিত ইমেইলটি আগে লিখুন! ⚠️");
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.innerText = "Sending...";
    btn.disabled = true;

    // মেইল পাঠানোর অফিশিয়াল মেথড
    auth.sendPasswordResetEmail(emailVal)
      .then(() => {
        alert("সফলভাবে রিসেট লিংক পাঠানো হয়েছে! 🚀\n\nআপনার ইমেইলটির (" + emailVal + ") ইনবক্স অথবা স্প্যাম ফোল্ডারটি চেক করুন।");
        document.getElementById('resetForm').reset();
        window.location.reload();
      })
      .catch((error) => {
        btn.innerText = "Send Reset Link";
        btn.disabled = false;
        
        if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-email') {
          alert("⚠️ ভুল: এই ইমেইল দিয়ে কোনো অ্যাকাউন্ট তৈরি করা হয়নি অথবা ইমেইলটি সঠিক নয়!");
        } else {
          alert("ত্রুটি: " + error.message);
        }
      });
  });
</script>
  

</body>
</html>
