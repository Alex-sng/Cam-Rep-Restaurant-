<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2W7N9TRH7"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-F2W7N9TRH7');

  <title>CAM SENG RESTURANT - Forgot Password</title>
</head>
<body style="background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

  <!-- মূল কন্টেইনার বক্স -->
  <div style="background: #1f2833; width: 100%; max-width: 500px; border-radius: 16px; padding: 40px 35px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #45f3ff33; text-align: center; box-sizing: border-box;">
    
    <!-- টপ ব্যানার বা শিরোনাম বার্তা -->
    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); padding: 15px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <span style="color: #45f3ff; font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Forgot Your Password?</span>
    </div>

    <!-- লোগো বা লক আইকন এরিয়া -->
    <div style="font-size: 55px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #ff4757);">🔒</div>
    <h2 style="margin: 0 0 15px 0; font-size: 28px; color: #45f3ff; letter-spacing: 1px; font-weight: 600;">Reset Password</h2>
    
    <!-- ছোট নির্দেশনামূলক টেক্সট -->
    <p style="color: #c5c6c7; font-size: 15px; margin: 0 0 30px 0; line-height: 1.5; text-align: center;">
      আপনার অ্যাকাউন্ট তৈরিতে ব্যবহৃত নম্বর অথবা ইমেইলটি নিচে দিন। আমরা পাসওয়ার্ড রিসেট করার জন্য একটি কোড পাঠাবো।
    </p>

    <!-- ফর্ম শুরু -->
    <form style="display: flex; flex-direction: column; gap: 25px; text-align: left;">
      
      <!-- নম্বর/ইমেইল ইনপুট বক্স -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 10px; font-weight: 500;">Number or Email:</label>
        <input type="text" id="resetInput" placeholder="Enter Registered Number or Email" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- নিওন-অরেঞ্জ ওটিপি বাটন -->
      <button type="button" onclick="sendOtpAlert()"
              style="background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4); margin-top: 5px;">
        Send Reset Code
      </button>

      <!-- আগের লগইন পেজে ফিরে যাওয়ার লিংক -->
      <div style="text-align: center; margin-top: 5px;">
        <a href="login&registration.html" style="color: #45f3ff; font-size: 15px; text-decoration: none; font-weight: 500; border-bottom: 1px dashed #45f3ff; padding-bottom: 2px;">Back to Login</a>
      </div>

    </form>

    <!-- ফুটার কপিরাইট সেকশন -->
    <div style="margin-top: 40px; border-top: 1px solid #2f3e46; padding-top: 20px; font-size: 13px; color: #868e96; line-height: 1.6;">
        <p style="margin: 0;">&copy; Copyright 2026. All Rights Reserved to Well Food.</p>
        <p style="margin: 5px 0 0 0;">Developed by XYZ Communication, Design & Managed</p>
    </div>

  </div>

  <!-- বাটনের সচল করার জাভাস্ক্রিপ্ট -->
  <script>
    function sendOtpAlert() {
        const inputVal = document.getElementById('resetInput').value;
        if(inputVal === "") {
            alert("অনুগ্রহ করে আপনার ইমেইল বা নম্বরটি আগে লিখুন! ⚠️");
        } else {
            alert("একটি ভেরিফিকেশন কোড সফলভাবে পাঠানো হয়েছে! 🚀");
        }
    }
  </script>

</body>
</html>
