<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2W7N9TRH7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-F2W7N9TRH7');

  <title>CAM SENG RESTAURANT - Register</title>
</head>
<body style="background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

  <!-- মূল কন্টেইনার বক্স -->
  <div style="background: #1f2833; width: 100%; max-width: 500px; border-radius: 16px; padding: 40px 35px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #45f3ff33; text-align: center; box-sizing: border-box;">
    
    <!-- টপ ব্যানার বা স্বাগতম বার্তা -->
    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); padding: 15px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <span style="color: #45f3ff; font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Create a new account</span>
    </div>

    <!-- লোগো বা আইকন এরিয়া -->
    <div style="font-size: 55px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #45f3ff);">🍳</div>
    <h2 style="margin: 0 0 30px 0; font-size: 28px; color: #45f3ff; letter-spacing: 1px; font-weight: 600;">Sign Up</h2>

    <form id="registerForm" style="display: flex; flex-direction: column; gap: 20px; text-align: left;">
  <div>
    <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Full Name:</label>
    <input type="text" id="regName" placeholder="Enter Your Full Name" required style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
  </div>
  <div>
    <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Email Address:</label>
    <input type="email" id="regEmail" placeholder="Enter Your Email Address" required style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
  </div>
  <div>
    <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Create Password:</label>
    <input type="password" id="regPassword" placeholder="Enter New Password" required style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
  </div>
  <div>
    <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Confirm Password:</label>
    <input type="password" id="regConfirmPassword" placeholder="Confirm Your Password" required style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
  </div>
  <button type="button" id="regBtn" style="background: linear-gradient(135deg, #00c6ff, #0072ff); color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); margin-top: 15px;">
    Register Now
  </button>
    </form>
    

    <!-- ফুটার কপিরাইট সেকশন -->
    <div style="margin-top: 40px; border-top: 1px solid #2f3e46; padding-top: 20px; font-size: 13px; color: #868e96; line-height: 1.6;">
        <p style="margin: 0;">&copy; Copyright 2026. All Rights Reserved to Well Food.</p>
        <p style="margin: 5px 0 0 0;">Developed by XYZ Communication, Design & Managed</p>
    </div>

  </div>

<!-- ফায়ারবেস ট্র্যাডিশনাল কোর এবং অথেনটিকেশন লাইব্রেরি (লিংক ঠিক করা হয়েছে) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<div style="text-align: center; margin-top: 15px;">
  <a href="Index.cam.html" id="backHomeBtn" style="text-decoration: none; display: inline-block; padding: 10px 20px; background-color: #17a2b8; color: white; border-radius: 20px; font-weight: bold;">
    ← Back to Home
  </a>
</div>

<script>
  // ফায়ারবেস কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyBEs5Tchusl9iSNDgik95jL_qMBQaF5lQk",
    authDomain: "cam-seng-restaurant.firebaseapp.com",
    projectId: "cam-seng-restaurant",
    storageBucket: "cam-seng-restaurant.firebasestorage.app",
    messagingSenderId: "142330585238",
    appId: "1:142330585238:web:2f3fd08ccd9743dd4762b7",
    measurementId: "G-9FXQ682T0D"
  };

  // ফায়ারবেস ইনিশিয়ালাইজেশন
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ফর্ম সাবমিট ইভেন্ট হ্যান্ডলার
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault(); 

    console.log("Registration Process Started!");

    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;

    if(password !== confirmPassword) {
      alert("⚠️ ভুল: পাসওয়ার্ড দুটি মেলেনি! আবার চেক করুন।");
      return;
    }

    if(password.length < 6) {
      alert("⚠️ নিরাপত্তা সতর্কবার্তা: পাসওয়ার্ডটি অন্তত ৬ অক্ষরের হতে হবে!");
      return;
    }

    const btn = document.getElementById('regBtn');
    btn.innerText = "Registering...";
    btn.disabled = true;

    // ফায়ারবেস সাইন-আপ ফাংশন
    auth.createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
        alert("অভিনন্দন! আপনার অ্যাকাউন্টটি সফলভাবে তৈরি করা হয়েছে। 🚀\nস্বাগতম: " + email);
        window.location.href = "Index.cam.html"; 
      })
      .catch((error) => {
        btn.innerText = "REGISTER NOW";
        btn.disabled = false;
        
        // এখানে সাধারণ অ্যালার্টের বদলে সরাসরি ফায়ারবেসের পাঠানো আসল মেসেজটি দেখাবে
        alert("রেজিস্ট্রেশন ব্যর্থ হয়েছে!\nকারণ: " + error.message);
      });
  });
</script>
  
  
  
</body>
</html>
