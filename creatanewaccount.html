  <title>CAM SENG RESTURANT - Register</title>

<body style="background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

  <!-- মূল কন্টেইনার বক্স -->
  <div style="background: #1f2833; width: 100%; max-width: 500px; border-radius: 16px; padding: 40px 35px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #45f3ff33; text-align: center; box-sizing: border-box;">
    
    <!-- টপ ব্যানার বা স্বাগতম বার্তা -->
    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); padding: 15px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <span style="color: #45f3ff; font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Create a new account</span>
    </div>

    <!-- লোগো বা আইকন এরিয়া -->
    <div style="font-size: 55px; margin-bottom: 5px; filter: drop-shadow(0 0 10px #45f3ff);">🍳</div>
    <h2 style="margin: 0 0 30px 0; font-size: 28px; color: #45f3ff; letter-spacing: 1px; font-weight: 600;">Sign Up</h2>

    <!-- ফর্ম শুরু -->
    <form style="display: flex; flex-direction: column; gap: 20px; text-align: left;">
      
      <!-- পুরো নাম ইনপুট -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Full Name:</label>
        <input type="text" placeholder="Enter Your Full Name" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- নম্বর/ইমেইল ইনপুট -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Number or Email:</label>
        <input type="text" placeholder="Enter Your Number or Email" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- পাসওয়ার্ড ইনপুট -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Create Password:</label>
        <input type="password" placeholder="Enter New Password" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- কনফার্ম পাসওয়ার্ড ইনপুট -->
      <div>
        <label style="font-size: 16px; color: #c5c6c7; display: block; margin-bottom: 8px; font-weight: 500;">Confirm Password:</label>
        <input type="password" placeholder="Confirm Your Password" required
               style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #45f3ff55; background-color: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; outline: none;">
      </div>

      <!-- নীল-সবুজ জমকালো সাইনআপ বাটন -->
      <button type="button" onclick="registerAlert()"
              style="background: linear-gradient(135deg, #00c6ff, #0072ff); color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); margin-top: 15px;">
        Register Now
      </button>

      <!-- অলরেডি একাউন্ট থাকলে লগইন করার লিংক -->
      <div style="text-align: center; margin-top: 5px;">
        <span style="color: #868e96; font-size: 15px;">Already have an account? </span>
        <a href="login&registration.html" style="color: #45f3ff; font-size: 15px; text-decoration: none; font-weight: 500; border-bottom: 1px dashed #45f3ff; padding-bottom: 2px;">Login here</a>
      </div>

    </form>

    <!-- ফুটার কপিরাইট সেকশন -->
    <div style="margin-top: 40px; border-top: 1px solid #2f3e46; padding-top: 20px; font-size: 13px; color: #868e96; line-height: 1.6;">
        <p style="margin: 0;">&copy; Copyright 2026. All Rights Reserved to Well Food.</p>
        <p style="margin: 5px 0 0 0;">Developed by XYZ Communication, Design & Managed</p>
    </div>

  </div>

  <!-- বাটনের সচল করার জাভাস্ক্রিপ্ট -->
  <script>
    function registerAlert() {
        alert("আপনার একাউন্টটি সফলভাবে তৈরি করা হয়েছে! 🚀");
    }
  </script>

<script type="module">
  import { initializeApp } from "https://gstatic.com";
  import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";

  const firebaseConfig = {
    apiKey: "AIzaSyBEs5Tchusl9iSNDgik95jL_qMBQaF5lQk",
    authDomain: "://firebaseapp.com",
    projectId: "cam-seng-restaurant",
    storageBucket: "cam-seng-restaurant.firebasestorage.app",
    messagingSenderId: "142330585238",
    appId: "1:142330585238:web:2f3fd08ccd9743dd4762b7",
    measurementId: "G-9FXQ682T0D"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // আপনার HTML ফর্মের সাবমিট বাটনে বা স্ক্রিপ্টে এই ফাংশনটি কল করবেন
  window.registerUser = function(email, password) {
    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("অ্যাকাউন্ট সফলভাবে তৈরি হয়েছে! স্বাগতম: " + userCredential.user.email);
        window.location.href = "Index.cam.html"; 
      })
      .catch((error) => {
        alert("ভুল হয়েছে: " + error.message);
      });
  }
</script>
  
  

</body>
</html>
