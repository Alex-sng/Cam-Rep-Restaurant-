<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  gtag('js', new Date());

  gtag('config', 'G-F2W7N9TRH7');

  <title>Contact Us</title>
</head>

<body style="background-color: #0b0c10; margin: 0; padding: 0;">

<header>
  <h1 style="background-color: yellow; color: darkblue; line-height: 50px; font-family: sans-serif; margin: 0; padding-left: 20px;" align="left"><b>Contact Form</b></h1>
</header>
<hr style="margin: 0;">
  
<div style="background-color: #111111; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; max-width: 450px; margin: 40px auto; padding: 30px 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); border: 1px solid #222; text-align: left;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <span style="color: #ffb400; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">Get In Touch</span>
        <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
        <h2 style="font-size: 28px; margin: 5px 0 0 0; color: #ffffff;">Contact Us</h2>
        <p style="color: #888888; font-size: 14px; margin-top: 5px;">যেকোনো প্রয়োজনে আমাদের মেসেজ পাঠান</p>
    </div>
    
    <form id="contactForm" onsubmit="handleSubmit(event)" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
            <label style="font-size: 14px; color: #cccccc; display: block; margin-bottom: 8px; font-weight: 500;">Your Name</label>
            <input type="text" id="custName" name="name" placeholder="আপনার পুরো নাম লিখুন" required
                   style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #1a1a1a; color: #fff; font-size: 15px; box-sizing: border-box; outline: none;">
        </div>

        <div>
            <label style="font-size: 14px; color: #cccccc; display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
            <input type="email" id="custEmail" name="email" placeholder="আপনার ইমেইল ঠিকানা" required
                   style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #1a1a1a; color: #fff; font-size: 15px; box-sizing: border-box; outline: none;">
        </div>

        <div>
            <label style="font-size: 14px; color: #cccccc; display: block; margin-bottom: 8px; font-weight: 500;">Your Message</label>
            <textarea id="custMessage" name="message" rows="4" placeholder="আপনার মতামত বা জিজ্ঞাসা এখানে লিখুন..." required
                      style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #1a1a1a; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; resize: none; font-family: inherit;"></textarea>
        </div>

        <button type="submit" id="submitBtn"
                style="background-color: #ffb400; color: #000000; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 180, 0, 0.2); transition: 0.3s; text-align: center;">
            Send Message 🚀
        </button>

    </form>
</div>
<script>
  function handleSubmit(event) {
    event.preventDefault(); // পেজ রিলোড হওয়া আটকাবে
    
    const form = document.getElementById('contactForm');
    const button = document.getElementById('submitBtn');
    const name = document.getElementById('custName').value;
    
    button.disabled = true;
    button.innerText = "Sending... ⏳";

    // ফর্মস্প্রির ব্যাক-এন্ডে ডেটা পাঠানোর Ajax রিকোয়েস্ট
    fetch("https://formspree.io/f/mpqenvbp", {
      method: "POST",
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      if (response.ok) {
        alert("ধন্যবাদ " + name + "! আপনার মেসেজটি আমাদের কাছে পৌঁছেছে। 🎉");
        form.reset(); // এখানে ফর্মের সব বক্স অটোমেটিক একদম খালি (Blank) হয়ে যাবে!
      } else {
        alert("উফ! কোথাও একটা ভুল হয়েছে। আবার চেষ্টা করুন। ⚠️");
      }
    })
    .catch(error => {
      alert("নেটওয়ার্ক সমস্যা! দয়া করে ইন্টারনেট কানেকশন চেক করুন।");
    })
    .finally(() => {
      button.disabled = false;
      button.innerText = "Send Message 🚀";
    });
  }
</script>
  
<p style="margin-bottom: 50px;"></p>

    ← Back to Home
  </a>
</div>

</html>
